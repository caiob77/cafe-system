# Stack de produção do Café System.
#
# Uso:
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build
#
# Variáveis obrigatórias no .env.production:
#   - POSTGRES_PASSWORD, POSTGRES_USER, POSTGRES_DB
#   - BETTER_AUTH_SECRET, BETTER_AUTH_URL, WEB_URL, NEXT_PUBLIC_API_URL
#   - DOMAIN (ex.: cafe.exemplo.com) e LETSENCRYPT_EMAIL
#   - SUPER_ADMIN_EMAILS, PRO_PLAN_PRICE
#   - CLOUDINARY_* se uploads forem necessários

services:
  postgres:
    image: postgres:16-alpine
    container_name: cafe-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - postgres_backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: cafe-redis-prod
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: cafe-api-prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_HOST: 0.0.0.0
      API_PORT: 3333
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      REDIS_URL: redis://redis:6379
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      WEB_URL: ${WEB_URL}
      SUPER_ADMIN_EMAILS: ${SUPER_ADMIN_EMAILS:-}
      PRO_PLAN_PRICE: ${PRO_PLAN_PRICE:-99}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: cafe-web-prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    depends_on:
      - api
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    container_name: cafe-nginx-prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/templates:ro
      - certbot_webroot:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - api
      - web
    networks:
      - internal
      - public

  certbot:
    image: certbot/certbot:latest
    container_name: cafe-certbot-prod
    restart: unless-stopped
    volumes:
      - certbot_webroot:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: /bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done'

volumes:
  postgres_data:
  postgres_backups:
  redis_data:
  certbot_webroot:
  certbot_certs:

networks:
  internal:
    driver: bridge
  public:
    driver: bridge
